<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Calendar</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f12;
      --surface: #161920;
      --surface2: #1e2229;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #7fffb2;
      --accent-dim: rgba(127, 255, 178, 0.1);
      --red: #ff6b6b;
      --red-dim: rgba(255, 107, 107, 0.1);
      --green: #7fffb2;
      --green-dim: rgba(127, 255, 178, 0.08);
      --amber: #ffd166;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 28px 40px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 14px;
      color: var(--muted);
      margin-left: auto;
      font-family: var(--mono);
    }

    main {
      flex: 1;
      padding: 48px 56px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* DROP ZONE */
    #drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 16px;
      padding: 64px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      position: relative;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(127, 255, 178, 0.04);
    }

    #drop-zone #file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #drop-zone #htm-input {
      display: none;
    }

    .drop-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .drop-icon svg {
      width: 22px;
      height: 22px;
      color: var(--accent);
    }

    #drop-zone h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    #drop-zone p {
      font-size: 14px;
      color: var(--muted);
    }

    .drop-hint {
      display: inline-block;
      margin-top: 20px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
    }

    /* ERROR */
    #error-box {
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 14px;
      color: var(--red);
    }

    /* RESULTS */
    #results {
      display: none;
      margin-top: 0;
    }

    .account-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .account-bar .acc-name {
      font-size: 16px;
      font-weight: 500;
    }

    .account-bar .acc-detail {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .account-bar .reset-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font);
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .account-bar .reset-btn:hover {
      border-color: var(--border2);
      color: var(--text);
      background: var(--surface2);
    }

    /* METRICS */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 36px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
    }

    .metric-card .m-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
      font-family: var(--mono);
    }

    .metric-card .m-value {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
      font-family: var(--mono);
    }

    .metric-card .m-value.green {
      color: var(--green);
    }

    .metric-card .m-value.red {
      color: var(--red);
    }

    .metric-card .m-value.amber {
      color: var(--amber);
    }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .month-nav h3 {
      font-size: 19px;
      font-weight: 500;
      flex: 1;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 16px;
    }

    .nav-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .nav-btn:disabled:hover {
      background: var(--surface);
      border-color: var(--border2);
      color: var(--text);
    }

    /* CALENDAR */
    .cal-and-weeks {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 36px;
    }

    .cal-wrap {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
    }

    .cal-main {
      flex: 1;
      min-width: 0;
    }

    /* WEEK SIDEBAR */
    .cal-body {
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .week-sidebar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      width: 115px;
      margin-top: 127px;
    }

    .week-ticker {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 10px;
      min-height: 110px;
      cursor: help;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .week-ticker:hover {
      border-color: var(--accent);
    }

    .wt-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .wt-value {
      font-size: 14px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: -0.3px;
    }

    .wt-value.pos { color: var(--green); }
    .wt-value.neg { color: var(--red); }
    .wt-value.muted { color: var(--muted); }

    .cal-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .cal-hdr {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
      font-family: var(--mono);
      letter-spacing: 0.5px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .cal-cell {
      border-radius: 12px;
      min-height: 110px;
      padding: 14px 14px 10px;
      border: 1px solid transparent;
      position: relative;
      cursor: default;
      transition: border-color 0.15s;
    }

    .cal-cell.empty {
      background: transparent;
    }

    .cal-cell.no-trade {
      background: var(--surface2);
      border-color: var(--border);
    }

    .cal-cell.win {
      background: rgba(127, 255, 178, 0.05);
      border-color: rgba(127, 255, 178, 0.15);
      cursor: pointer;
    }

    .cal-cell.win:hover {
      border-color: rgba(127, 255, 178, 0.4);
      background: rgba(127, 255, 178, 0.09);
    }

    .cal-cell.loss {
      background: rgba(255, 107, 107, 0.05);
      border-color: rgba(255, 107, 107, 0.15);
      cursor: pointer;
    }

    .cal-cell.loss:hover {
      border-color: rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.09);
    }

    .cal-cell.today {
      outline: 2px solid rgba(255, 209, 102, 0.5);
    }

    .cell-day {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 8px;
    }

    .cell-pnl {
      font-size: 16px;
      font-weight: 500;
      font-family: var(--mono);
      letter-spacing: -0.3px;
    }

    .cell-pnl.pos {
      color: var(--green);
    }

    .cell-pnl.neg {
      color: var(--red);
    }

    .cell-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .cell-wr {
      font-size: 11px;
      margin-top: 3px;
      font-family: var(--mono);
    }

    .cell-wr.good {
      color: rgba(127, 255, 178, 0.7);
    }

    .cell-wr.bad {
      color: rgba(255, 107, 107, 0.7);
    }

    /* BAR CHART */
    .chart-section {
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: var(--mono);
      margin-bottom: 16px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 9px;
    }

    .bar-date {
      font-size: 12px;
      color: var(--muted);
      width: 60px;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    .bar-track {
      flex: 1;
      height: 32px;
      background: var(--surface2);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      min-width: 90px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .bar-fill.pos {
      background: rgba(127, 255, 178, 0.15);
      color: var(--green);
      border: 1px solid rgba(127, 255, 178, 0.2);
    }

    .bar-fill.neg {
      background: rgba(255, 107, 107, 0.12);
      color: var(--red);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    .bar-trades {
      font-size: 11px;
      color: var(--muted);
      width: 64px;
      text-align: right;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    /* LOSSES TABLE */
    .losses-section {
      margin-bottom: 28px;
    }

    .losses-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .loss-card {
      background: var(--surface);
      border: 1px solid rgba(255, 107, 107, 0.15);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .loss-card .lc-date {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 8px;
    }

    .loss-card .lc-total {
      font-size: 18px;
      font-weight: 500;
      color: var(--red);
      font-family: var(--mono);
      margin-bottom: 4px;
    }

    .loss-card .lc-meta {
      font-size: 11px;
      color: var(--muted);
    }

    /* TOOLTIP */
    .tooltip {
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 13px;
      pointer-events: none;
      z-index: 1000;
      min-width: 220px;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .tt-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      font-family: var(--mono);
      color: var(--accent);
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin: 6px 0;
    }

    .tt-label {
      color: var(--muted);
      font-size: 13px;
    }

    .tt-val {
      font-weight: 500;
      font-family: var(--mono);
      font-size: 13px;
    }

    .tt-val.pos {
      color: var(--green);
    }

    .tt-val.neg {
      color: var(--red);
    }

    /* LOADING */
    #loading {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      main {
        padding: 20px;
      }

      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .losses-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      header {
        padding: 20px;
      }

      header span {
        display: none;
      }

      .cal-cell {
        min-height: 60px;
        padding: 6px;
      }

      .cell-pnl {
        font-size: 11px;
      }
    }

    /* YEAR VIEW STYLES */
    #month-title {
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }

    #month-title:hover {
      color: var(--accent);
    }

    .cal-headers.hidden {
      display: none;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    .year-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .year-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      background: rgba(127, 255, 178, 0.04);
    }

    .year-card.active {
      border-color: var(--accent);
      background: rgba(127, 255, 178, 0.05);
    }

    .year-card.win {
      border-color: rgba(127, 255, 178, 0.15);
    }

    .year-card.loss {
      border-color: rgba(255, 107, 107, 0.15);
    }

    .yc-month {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-family: var(--mono);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .yc-pnl {
      font-size: 18px;
      font-weight: 500;
      font-family: var(--mono);
    }

    .yc-pnl.pos {
      color: var(--green);
    }

    .yc-pnl.neg {
      color: var(--red);
    }

    .yc-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .cell-pct {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 600;
      opacity: 0.85;
      margin-top: 1px;
    }

    .cell-pct.pos { color: var(--green); }
    .cell-pct.neg { color: var(--red); }

    /* CENT ACCOUNT TOGGLE */
    .cent-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      cursor: pointer;
      padding: 7px 14px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: none;
      transition: all 0.15s;
      user-select: none;
    }

    .cent-toggle:hover { border-color: var(--accent); color: var(--text); }
    .cent-toggle.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .cent-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--accent);
      color: #0d0f12;
      font-weight: 600;
      font-family: var(--mono);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 13L7 8L10 11L14 5" stroke="#0d0f12" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </div>
    <h1>Trade Calendar</h1>
    <span>MT4 / MT5 — Trade History Report</span>
  </header>

  <main>

    <div id="drop-zone">
      <input type="file" accept=".xlsx,.xls" id="file-input">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14,2 14,8 20,8" />
          <line x1="12" y1="18" x2="12" y2="12" />
          <polyline points="9,15 12,12 15,15" />
        </svg>
      </div>
      <h2>Cargá tu reporte de trades</h2>
      <p>Arrastrá el archivo Excel exportado desde MT4/MT5 o hacé click para seleccionarlo</p>
      <span class="drop-hint">Trade History Report (.xlsx)</span>
      <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;">
        <button class="cent-toggle" id="cent-toggle-btn" onclick="toggleCent()">
          <span>¢ Cuenta Cent</span>
        </button>
        <label style="cursor:pointer;position:relative;z-index:10;">
          <input type="file" accept=".htm,.html" id="htm-input">
          <span class="cent-toggle" style="display:inline-flex;align-items:center;gap:8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            Strategy Tester (.htm)
          </span>
        </label>
      </div>
    </div>

    <div id="error-box"></div>
    <div id="loading">
      <div class="spinner"></div>Procesando trades...
    </div>

    <div id="results">
      <div class="account-bar" id="account-bar"></div>
      <div class="metrics-grid" id="metrics-grid"></div>

      <div class="cal-and-weeks">
        <div class="cal-wrap">
          <div class="month-nav">
            <h3 id="month-title"></h3>
            <button class="nav-btn" id="prev-btn" onclick="changeMonth(-1)">&#8592;</button>
            <button class="nav-btn" id="next-btn" onclick="changeMonth(1)">&#8594;</button>
          </div>
          <div class="cal-headers">
            <div class="cal-hdr">DOM</div>
            <div class="cal-hdr">LUN</div>
            <div class="cal-hdr">MAR</div>
            <div class="cal-hdr">MIÉ</div>
            <div class="cal-hdr">JUE</div>
            <div class="cal-hdr">VIE</div>
            <div class="cal-hdr">SÁB</div>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
        <div class="week-sidebar" id="week-sidebar"></div>
      </div>

      <div class="chart-section">
        <div class="section-title">Curva de P&L acumulado</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;">
          <div style="position:relative;width:100%;height:340px;">
            <canvas id="pnl-line-chart" role="img" aria-label="Gráfico de línea del P&L acumulado por día"></canvas>
          </div>
        </div>
      </div>

      <div class="chart-section">
        <div class="section-title">P&L neto por día</div>
        <div id="bar-chart"></div>
      </div>

    </div>

  </main>

  <div class="tooltip" id="tooltip"></div>

  <script>
    let allData = {};
    let currentYear, currentMonth;
    let months = [];
    let monthIdx = 0;
    let currentView = 'monthly';
    let isCentAccount = false;

    const MONTH_NAMES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const errorBox = document.getElementById('error-box');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const tooltip = document.getElementById('tooltip');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) { if (f.name.endsWith('.htm') || f.name.endsWith('.html')) processHtmFile(f); else processFile(f); } });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
    document.getElementById('htm-input').addEventListener('change', e => { if (e.target.files[0]) processHtmFile(e.target.files[0]); });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      loading.style.display = 'none';
    }

    function processFile(file) {
      errorBox.style.display = 'none';
      loading.style.display = 'block';
      results.style.display = 'none';

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
          parseAndRender(raw);
        } catch (err) {
          showError('No se pudo leer el archivo. Asegurate de exportar el reporte desde MT4/MT5 en formato .xlsx');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function processHtmFile(file) {
      errorBox.style.display = 'none';
      loading.style.display = 'block';
      results.style.display = 'none';
      const reader = new FileReader();
      reader.onload = e => {
        try {
          parseStrategyTester(e.target.result, file.name);
        } catch (err) {
          showError('No se pudo leer el archivo Strategy Tester: ' + err.message);
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function parseStrategyTester(html, fileName) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Server/account info from meta or divs
      const serverMeta = doc.querySelector('meta[name="server"]');
      const company = serverMeta ? serverMeta.getAttribute('content') : '';
      const titleEl = doc.querySelector('title');
      const accountName = titleEl ? titleEl.textContent.replace('Strategy Tester:', '').trim() || 'Strategy Tester' : 'Strategy Tester';

      // Find the trades table: the one with header containing "Profit" and "Balance"
      let tradeTable = null;
      doc.querySelectorAll('table').forEach(t => {
        if (t.textContent.includes('Profit') && t.textContent.includes('Balance')) tradeTable = t;
      });
      if (!tradeTable) { showError('No se encontró tabla de trades en el archivo Strategy Tester.'); return; }

      const rows = Array.from(tradeTable.querySelectorAll('tr'));
      const trades = [];
      let initialBalance = 0;
      let initialBalanceFound = false;
      const orderType = {}; // order# -> 'buy'|'sell'

      rows.forEach(row => {
        const cells = Array.from(row.querySelectorAll('td'));
        if (cells.length < 8) return;

        const type = (cells[2].textContent || '').trim().toLowerCase();
        const isClosed = type === 'close' || type === 's/l' || type === 't/p';
        const isOpen = type === 'buy' || type === 'sell';

        if (!isClosed && !isOpen) return;

        const orderNum = (cells[3].textContent || '').trim();
        const dateRaw = (cells[1].textContent || '').trim();
        const dateParts = dateRaw.match(/^(\d{4})\.(\d{2})\.(\d{2})/);
        if (!dateParts) return;
        const dateKey = `${dateParts[1]}-${dateParts[2]}-${dateParts[3]}`;

        const vol = parseFloat(cells[4].textContent) || 0;

        if (isOpen) {
          orderType[orderNum] = type; // guardar 'buy' o 'sell'
        }

        if (isClosed) {
          const profit = parseFloat(cells[8].textContent);
          const balance = parseFloat(cells[9].textContent);
          if (isNaN(profit)) return;
          if (!initialBalanceFound && !isNaN(balance)) {
            initialBalance = balance - profit;
            initialBalanceFound = true;
          }
          const tradeType = orderType[orderNum] || 'buy';
          trades.push({ date: dateKey, profit, net: profit, commission: 0, swap: 0, type: tradeType, vol });
        }
      });

      if (trades.length === 0) { showError('No se encontraron trades cerrados en el Strategy Tester.'); return; }

      // Group by date (reuse same logic)
      const byDate = {};
      trades.forEach(t => {
        if (!byDate[t.date]) byDate[t.date] = [];
        byDate[t.date].push(t);
      });

      const daily = {};
      Object.keys(byDate).forEach(date => {
        const ts = byDate[date];
        const profits = ts.map(t => t.profit);
        const winners = ts.filter(t => t.profit > 0);
        const losers = ts.filter(t => t.profit < 0);
        daily[date] = {
          date,
          trades: ts.length,
          net: profits.reduce((a, b) => a + b, 0),
          grossProfit: winners.reduce((a, t) => a + t.profit, 0),
          grossLoss: losers.reduce((a, t) => a + t.profit, 0),
          wins: winners.length,
          losses: losers.length,
          best: Math.max(...profits),
          worst: Math.min(...profits),
          wr: (winners.length / ts.length * 100),
          totalLots: parseFloat(ts.reduce((a, t) => a + (t.vol || 0), 0).toFixed(2)),
        };
      });

      // % change with running balance
      const sortedDates = Object.keys(daily).sort();
      let runningBalance = initialBalance;
      sortedDates.forEach(dateKey => {
        const balanceStartOfDay = runningBalance;
        daily[dateKey].pctChange = balanceStartOfDay !== 0
          ? (daily[dateKey].net / balanceStartOfDay) * 100
          : null;
        runningBalance += daily[dateKey].net;
      });

      const buys = trades.filter(t => t.type === 'buy');
      const sells = trades.filter(t => t.type === 'sell');
      const ratios = {
        buys: buys.length,
        sells: sells.length,
        wrBuy: buys.length > 0 ? (buys.filter(t => t.net > 0).length / buys.length * 100) : 0,
        wrSell: sells.length > 0 ? (sells.filter(t => t.net > 0).length / sells.length * 100) : 0
      };
      allData = { daily, accountName, accountNum: '', company, totalTrades: trades.length, ratios, initialBalance };

      const dateKeys = Object.keys(daily).sort();
      const monthSet = new Set(dateKeys.map(d => d.slice(0, 7)));
      months = Array.from(monthSet).sort();
      monthIdx = months.length - 1;

      loading.style.display = 'none';
      dropZone.style.display = 'none';
      results.style.display = 'block';
      renderAll();
    }

    function parseAndRender(raw) {
      let accountName = '', accountNum = '', company = '';
      let headerRow = -1;
      let format = 'mt4'; // 'mt4' or 'exness'

      for (let i = 0; i < Math.min(raw.length, 20); i++) {
        const row = raw[i];
        if (!row) continue;
        const f0 = String(row[0] || '').trim();
        const f2 = String(row[2] || '').trim();

        if (f0 === 'Name:' || f0 === 'Nombre:') accountName = String(row[3] || '').trim();
        if (f0 === 'Account:' || f0 === 'Cuenta de trading:') accountNum = String(row[3] || '').trim();
        if (f0 === 'Company:' || f0 === 'Empresa:') company = String(row[3] || '').trim();

        // Standard MT4/MT5: row[0]="Time", row[1]="Position"
        if ((f0 === 'Time' || f0 === 'Fecha/Hora') && (String(row[1] || '').trim() === 'Position' || String(row[1] || '').trim() === 'Posición')) {
          headerRow = i; format = 'mt4'; break;
        }
        // Exness: row[0]="Symbol", row[2]="Time", row[3]="Type"
        if (f0 === 'Symbol' && f2 === 'Time') {
          headerRow = i; format = 'exness'; break;
        }
        // Exness variant: row[0]="Symbol", row[1]="Position"
        if (f0 === 'Symbol' && String(row[3] || '').trim() === 'Type') {
          headerRow = i; format = 'exness'; break;
        }
      }

      if (headerRow === -1) {
        showError('Formato no reconocido. Exportá el reporte desde MT4/MT5 o Exness: Account History → Save as Report (.xlsx)');
        return;
      }

      const trades = [];
      let initialBalance = 0;
      let initialBalanceFound = false;

      for (let i = headerRow + 1; i < raw.length; i++) {
        const row = raw[i];
        if (!row) continue;

        let type, dateStr, profit, vol, commission = 0, swap = 0;

        if (format === 'exness') {
          // Exness: Symbol | Position | Time | Type | Volume | Price | S/L | T/P | Market Price | Swap | Profit
          if (!row[0] || !row[2]) continue;
          type = String(row[3] || '').trim().toLowerCase();
          // Capturar balance inicial (deposit/balance row)
          if (!initialBalanceFound && (type === 'balance' || type === 'deposit' || type === 'credit')) {
            const bal = parseFloat(row[10]);
            if (!isNaN(bal) && bal > 0) { initialBalance = bal; initialBalanceFound = true; }
          }
          if (type !== 'buy' && type !== 'sell') continue;
          vol = parseFloat(row[4]);
          profit = parseFloat(row[10]);
          swap = parseFloat(row[9]) || 0;
          dateStr = String(row[2]).trim();
        } else {
          // Standard MT4/MT5: Time | Position | Symbol | Type | Volume | ... | Commission | Swap | Profit
          if (!row[0]) continue;
          type = String(row[3] || '').trim().toLowerCase();
          // Capturar balance inicial (deposit/balance row)
          if (!initialBalanceFound && (type === 'balance' || type === 'deposit' || type === 'credit')) {
            const bal = parseFloat(row[12]);
            if (!isNaN(bal) && bal > 0) { initialBalance = bal; initialBalanceFound = true; }
          }
          if (type !== 'buy' && type !== 'sell') continue;
          vol = parseFloat(row[4]);
          profit = parseFloat(row[12]);
          commission = parseFloat(row[10]) || 0;
          swap = parseFloat(row[11]) || 0;
          dateStr = String(row[0]).trim();
        }

        if (isNaN(vol) || isNaN(profit)) continue;

        const dateParts = dateStr.match(/^(\d{4})\.(\d{2})\.(\d{2})/);
        if (!dateParts) continue;
        const dateKey = `${dateParts[1]}-${dateParts[2]}-${dateParts[3]}`;

        trades.push({ date: dateKey, profit, commission, swap, net: profit + commission + swap, type, vol });
      }

      if (trades.length === 0) {
        showError('No se encontraron trades en el archivo. Verificá que el reporte incluya historial de operaciones cerradas.');
        return;
      }

      // Group by date
      const byDate = {};
      trades.forEach(t => {
        if (!byDate[t.date]) byDate[t.date] = [];
        byDate[t.date].push(t);
      });

      const daily = {};
      Object.keys(byDate).forEach(date => {
        const ts = byDate[date];
        const profits = ts.map(t => t.profit);
        const nets = ts.map(t => t.net);
        const winners = ts.filter(t => t.profit > 0);
        const losers = ts.filter(t => t.profit < 0);
        daily[date] = {
          date,
          trades: ts.length,
          net: nets.reduce((a, b) => a + b, 0),
          grossProfit: winners.reduce((a, t) => a + t.profit, 0),
          grossLoss: losers.reduce((a, t) => a + t.profit, 0),
          wins: winners.length,
          losses: losers.length,
          best: Math.max(...profits),
          worst: Math.min(...profits),
          wr: (winners.length / ts.length * 100),
          totalLots: parseFloat(ts.reduce((a, t) => a + (t.vol || 0), 0).toFixed(2)),
        };
      });

      // Calcular porcentaje de cambio respecto al balance real del inicio del día
      const sortedDates = Object.keys(daily).sort();
      let runningBalance = initialBalance;
      sortedDates.forEach(dateKey => {
        const balanceStartOfDay = runningBalance;
        daily[dateKey].pctChange = balanceStartOfDay !== 0
          ? (daily[dateKey].net / balanceStartOfDay) * 100
          : null;
        runningBalance += daily[dateKey].net;
      });

      const buys = trades.filter(t => t.type === 'buy');
      const sells = trades.filter(t => t.type === 'sell');
      const ratios = {
        buys: buys.length,
        sells: sells.length,
        wrBuy: buys.length > 0 ? (buys.filter(t => t.net > 0).length / buys.length * 100) : 0,
        wrSell: sells.length > 0 ? (sells.filter(t => t.net > 0).length / sells.length * 100) : 0
      };

      allData = { daily, accountName, accountNum, company, totalTrades: trades.length, ratios, initialBalance };

      // Build months list
      const dateKeys = Object.keys(daily).sort();
      const monthSet = new Set(dateKeys.map(d => d.slice(0, 7)));
      months = Array.from(monthSet).sort();
      monthIdx = months.length - 1;

      loading.style.display = 'none';
      dropZone.style.display = 'none';
      results.style.display = 'block';

      renderAll();
    }

    let pnlLineChart = null;

    function renderAll() {
      renderAccountBar();
      renderMetrics();
      renderCalendar();
      renderLineChart();
      renderBars();
    }

    function renderLineChart() {
      const days = Object.values(allData.daily).sort((a, b) => a.date.localeCompare(b.date));

      // Build cumulative PNL
      let cumulative = 0;
      const labels = [];
      const cumulData = [];
      days.forEach(d => {
        cumulative += d.net;
        labels.push(d.date.slice(5).replace('-', '/'));
        cumulData.push(parseFloat(cumulative.toFixed(2)));
      });

      // Add a $0 point at start
      labels.unshift('inicio');
      cumulData.unshift(0);

      // Destroy previous chart if exists
      if (pnlLineChart) { pnlLineChart.destroy(); pnlLineChart = null; }

      const isPositive = cumulData[cumulData.length - 1] >= 0;
      const lineColor = isPositive ? '#7fffb2' : '#ff6b6b';
      const fillColor = isPositive ? 'rgba(127,255,178,0.08)' : 'rgba(255,107,107,0.08)';

      const ctx = document.getElementById('pnl-line-chart').getContext('2d');

      // Gradient fill
      const gradient = ctx.createLinearGradient(0, 0, 0, 260);
      gradient.addColorStop(0, isPositive ? 'rgba(127,255,178,0.18)' : 'rgba(255,107,107,0.18)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');

      pnlLineChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: cumulData,
            borderColor: lineColor,
            borderWidth: 2,
            pointRadius: (ctx) => ctx.dataIndex === 0 ? 0 : 4,
            pointHoverRadius: 6,
            pointBackgroundColor: lineColor,
            pointBorderColor: '#161920',
            pointBorderWidth: 2,
            fill: true,
            backgroundColor: gradient,
            tension: 0.45,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e2229',
              borderColor: 'rgba(255,255,255,0.13)',
              borderWidth: 1,
              titleColor: '#6b7280',
              bodyColor: lineColor,
              titleFont: { family: 'DM Mono', size: 11 },
              bodyFont: { family: 'DM Mono', size: 14, weight: '500' },
              padding: 12,
              callbacks: {
                title: (items) => items[0].label,
                label: (item) => {
                  const v = item.raw;
                  return (v >= 0 ? '+$' : '-$') + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#6b7280', font: { family: 'DM Mono', size: 10 }, maxRotation: 0 },
              border: { color: 'rgba(255,255,255,0.07)' }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: {
                color: '#6b7280',
                font: { family: 'DM Mono', size: 10 },
                callback: v => {
                  const val = isCentAccount ? v / 100 : v;
                  return (val >= 0 ? '+$' : '-$') + Math.abs(val).toLocaleString('en-US', { maximumFractionDigits: 0 });
                }
              },
              border: { color: 'rgba(255,255,255,0.07)' }
            }
          }
        }
      });
    }

    function renderAccountBar() {
      const { accountName, accountNum, company } = allData;
      document.getElementById('account-bar').innerHTML = `
    <div style="width:36px;height:36px;background:var(--accent-dim);border:1px solid rgba(127,255,178,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div>
      <div class="acc-name">${accountName || 'Cuenta MT'}${isCentAccount ? ' <span class="cent-badge">CENT</span>' : ''}</div>
      <div class="acc-detail">${accountNum ? accountNum.split(' ')[0] : ''} ${company ? '&middot; ' + company : ''}</div>
    </div>
    <button class="cent-toggle ${isCentAccount ? 'active' : ''}" onclick="toggleCent()" style="margin-left:12px;">¢ Cuenta Cent</button>
    <button class="reset-btn" onclick="resetApp()">&#8592; Cargar otro archivo</button>
  `;
    }

    function renderMetrics() {
      const d = allData.daily;
      const days = Object.values(d);
      const totalNet = days.reduce((a, x) => a + x.net, 0);
      const totalTrades = days.reduce((a, x) => a + x.trades, 0);
      const totalWins = days.reduce((a, x) => a + x.wins, 0);
      const totalLosses = days.reduce((a, x) => a + x.losses, 0);
      const grossLoss = days.reduce((a, x) => a + x.grossLoss, 0);
      const bestDay = Math.max(...days.map(x => x.net));
      const wr = (totalWins / totalTrades * 100);

      const r = allData.ratios;

      document.getElementById('metrics-grid').innerHTML = `
    <div class="metric-card">
      <div class="m-label">P&L neto total</div>
      <div class="m-value ${totalNet >= 0 ? 'green' : 'red'}">${fmtMoney(totalNet)}</div>
    </div>
    <div class="metric-card">
      <div class="m-label">Trades totales</div>
      <div class="m-value">${totalTrades}</div>
    </div>
    <div class="metric-card">
      <div class="m-label">Win rate global</div>
      <div class="m-value ${wr >= 50 ? 'green' : 'amber'}">${wr.toFixed(1)}%</div>
    </div>
    <div class="metric-card">
      <div class="m-label">Mejor día</div>
      <div class="m-value green">${fmtMoney(bestDay)}</div>
    </div>
    <div class="metric-card" id="ratio-card" style="cursor:help;">
      <div class="m-label">Longs / Shorts</div>
      <div class="m-value">${r.buys} / ${r.sells}</div>
    </div>
  `;

      const ratioCard = document.getElementById('ratio-card');
      ratioCard.addEventListener('mouseenter', e => {
        tooltip.innerHTML = `
          <div class="tt-title">Rendimiento por tipo</div>
          <div class="tt-row"><span class="tt-label">Longs (Buy) WR</span><span class="tt-val ${r.wrBuy >= 50 ? 'pos' : 'neg'}">${r.wrBuy.toFixed(1)}%</span></div>
          <div class="tt-row"><span class="tt-label">Shorts (Sell) WR</span><span class="tt-val ${r.wrSell >= 50 ? 'pos' : 'neg'}">${r.wrSell.toFixed(1)}%</span></div>
        `;
        tooltip.style.display = 'block';
        moveTip(e);
      });
      ratioCard.addEventListener('mousemove', moveTip);
      ratioCard.addEventListener('mouseleave', hideTip);
    }

    function renderCalendar() {
      const ym = months[monthIdx];
      const [year, month] = ym.split('-').map(Number);
      const monthName = MONTH_NAMES[month - 1];

      currentView = 'monthly';
      document.getElementById('month-title').textContent = `${monthName} ${year}`;
      document.getElementById('month-title').onclick = toggleView;
      document.querySelector('.cal-headers').classList.remove('hidden');
      document.getElementById('week-sidebar').style.display = 'flex';

      document.getElementById('prev-btn').disabled = monthIdx === 0;
      document.getElementById('next-btn').disabled = monthIdx === months.length - 1;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      grid.className = 'cal-grid'; // Reset class for monthly

      const firstDay = new Date(year, month - 1, 1).getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'cal-cell empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const info = allData.daily[dateKey];
        const cell = document.createElement('div');
        const isToday = dateKey === todayStr;

        if (info) {
          cell.className = 'cal-cell ' + (info.net >= 0 ? 'win' : 'loss') + (isToday ? ' today' : '');
          const pctHtml = info.pctChange !== null
            ? `<div class="cell-pct ${info.pctChange >= 0 ? 'pos' : 'neg'}">${info.pctChange >= 0 ? '+' : ''}${info.pctChange.toFixed(1)}%</div>`
            : '';
          cell.innerHTML = `
        <div class="cell-day">${d}</div>
        <div class="cell-pnl ${info.net >= 0 ? 'pos' : 'neg'}">${fmtMoney(info.net)}</div>
        ${pctHtml}
        <div class="cell-meta">${info.trades} trades</div>
        <div class="cell-wr ${info.wr >= 50 ? 'good' : 'bad'}">${info.wr.toFixed(1)}% WR</div>
      `;
          cell.addEventListener('mouseenter', ev => showTip(ev, info));
          cell.addEventListener('mousemove', moveTip);
          cell.addEventListener('mouseleave', hideTip);
        } else {
          cell.className = 'cal-cell no-trade' + (isToday ? ' today' : '');
          cell.innerHTML = `<div class="cell-day">${d}</div>`;
        }
        grid.appendChild(cell);
      }

      renderWeeklySidebar(year, month);
    }

    function calcWeeklyPnl(year, month) {
      const daysInMonth = new Date(year, month, 0).getDate();
      const firstDay = new Date(year, month - 1, 1).getDay(); // igual que renderCalendar
      const weeks = [];

      for (let d = 1; d <= daysInMonth; d++) {
        const weekNum = Math.floor((firstDay + d - 1) / 7);
        if (!weeks[weekNum]) weeks[weekNum] = { net: 0, trades: 0, wins: 0, lots: 0, days: [] };

        const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const info = allData.daily[dateKey];
        if (info) {
          weeks[weekNum].net += info.net;
          weeks[weekNum].trades += info.trades;
          weeks[weekNum].wins += info.wins;
          weeks[weekNum].lots += info.totalLots || 0;
          weeks[weekNum].days.push(info);
        }
      }
      return weeks;
    }

    function renderWeeklySidebar(year, month) {
      const sidebar = document.getElementById('week-sidebar');
      sidebar.innerHTML = '';
      sidebar.style.display = 'flex';

      const weeks = calcWeeklyPnl(year, month);

      weeks.forEach((wk, i) => {
        const hasData = wk.trades > 0;
        const wr = hasData ? (wk.wins / wk.trades * 100) : 0;

        const ticker = document.createElement('div');
        ticker.className = 'week-ticker';
        ticker.innerHTML = `
          <div class="wt-label">Week ${i + 1}</div>
          <div class="wt-value ${!hasData ? 'muted' : wk.net >= 0 ? 'pos' : 'neg'}">${
            hasData ? fmtMoney(wk.net) : '—'
          }</div>
        `;

        if (hasData) {
          ticker.addEventListener('mouseenter', e => {
            tooltip.innerHTML = `
              <div class="tt-title">Week ${i + 1}</div>
              <div class="tt-row"><span class="tt-label">P&L neto</span><span class="tt-val ${wk.net >= 0 ? 'pos' : 'neg'}">${fmtMoney(wk.net)}</span></div>
              <div class="tt-row"><span class="tt-label">Trades</span><span class="tt-val">${wk.trades}</span></div>
              <div class="tt-row"><span class="tt-label">Lotes</span><span class="tt-val">${parseFloat(wk.lots.toFixed(2))}</span></div>
              <div class="tt-row"><span class="tt-label">Win rate</span><span class="tt-val ${wr >= 50 ? 'pos' : 'neg'}">${wr.toFixed(1)}%</span></div>
            `;
            tooltip.style.display = 'block';
            moveTip(e);
          });
          ticker.addEventListener('mousemove', moveTip);
          ticker.addEventListener('mouseleave', hideTip);
        }
        sidebar.appendChild(ticker);
      });
    }

    function renderYearView() {
      const ym = months[monthIdx];
      const [year] = ym.split('-').map(Number);

      currentView = 'yearly';
      document.getElementById('month-title').textContent = `${year}`;
      document.getElementById('month-title').onclick = toggleView;
      document.querySelector('.cal-headers').classList.add('hidden');
      document.getElementById('week-sidebar').style.display = 'none';

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      grid.className = 'year-grid';

      // Group by months for the current year
      for (let m = 1; m <= 12; m++) {
        const mKey = `${year}-${String(m).padStart(2, '0')}`;
        const monthDays = Object.values(allData.daily).filter(d => d.date.startsWith(mKey));

        const totalNet = monthDays.reduce((sum, d) => sum + d.net, 0);
        const totalTrades = monthDays.reduce((sum, d) => sum + d.trades, 0);
        const totalWins = monthDays.reduce((sum, d) => sum + d.wins, 0);
        const grossProfit = monthDays.reduce((sum, d) => sum + d.grossProfit, 0);
        const grossLoss = monthDays.reduce((sum, d) => sum + d.grossLoss, 0);
        const best = monthDays.length > 0 ? Math.max(...monthDays.map(d => d.best)) : 0;
        const worst = monthDays.length > 0 ? Math.min(...monthDays.map(d => d.worst)) : 0;
        
        const hasData = monthDays.length > 0;

        const card = document.createElement('div');
        card.className = `year-card ${hasData ? (totalNet >= 0 ? 'win' : 'loss') : 'empty'}`;
        if (mKey === ym) card.classList.add('active');

        card.innerHTML = `
          <div class="yc-month">${MONTH_NAMES[m - 1]}</div>
          <div class="yc-pnl ${totalNet >= 0 ? 'pos' : 'neg'}">${hasData ? fmtMoney(totalNet) : '$0.00'}</div>
          <div class="yc-meta">${totalTrades} trades</div>
        `;

        if (hasData) {
          const monthInfo = {
            date: MONTH_NAMES[m - 1] + ' ' + year,
            net: totalNet,
            grossProfit,
            grossLoss,
            trades: totalTrades,
            wr: (totalWins / totalTrades * 100),
            best,
            worst
          };

          card.onclick = () => {
            const newIdx = months.indexOf(mKey);
            if (newIdx !== -1) {
              monthIdx = newIdx;
              renderCalendar();
            }
          };

          card.addEventListener('mouseenter', ev => showTip(ev, monthInfo));
          card.addEventListener('mousemove', moveTip);
          card.addEventListener('mouseleave', hideTip);
        }
        grid.appendChild(card);
      }
    }

    function toggleView() {
      if (currentView === 'monthly') {
        renderYearView();
      } else {
        renderCalendar();
      }
    }

    function changeMonth(dir) {
      monthIdx = Math.max(0, Math.min(months.length - 1, monthIdx + dir));
      renderCalendar();
    }

    function renderBars() {
      const days = Object.values(allData.daily).sort((a, b) => a.date.localeCompare(b.date));
      const maxAbs = Math.max(...days.map(d => Math.abs(d.net)));
      const container = document.getElementById('bar-chart');
      container.innerHTML = '';
      days.forEach(d => {
        const pct = Math.round(Math.abs(d.net) / maxAbs * 100);
        const label = d.date.slice(5).replace('-', '/');
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
      <div class="bar-date">${label}</div>
      <div class="bar-track">
        <div class="bar-fill ${d.net >= 0 ? 'pos' : 'neg'}" style="width:${pct}%">${fmtMoney(d.net)}</div>
      </div>
      <div class="bar-trades">${d.trades} ops</div>
    `;
        container.appendChild(row);
      });
    }



    function showTip(e, info) {
      tooltip.innerHTML = `
    <div class="tt-title">${info.date}</div>
    <div class="tt-row"><span class="tt-label">P&L neto</span><span class="tt-val ${info.net >= 0 ? 'pos' : 'neg'}">${fmtMoney(info.net)}</span></div>
    <div class="tt-row"><span class="tt-label">Bruto ganado</span><span class="tt-val pos">${fmtMoney(info.grossProfit)}</span></div>
    <div class="tt-row"><span class="tt-label">Bruto perdido</span><span class="tt-val neg">${fmtMoney(info.grossLoss)}</span></div>
    <div class="tt-row"><span class="tt-label">Trades</span><span class="tt-val">${info.trades}</span></div>
    <div class="tt-row"><span class="tt-label">Lotes</span><span class="tt-val">${info.totalLots != null ? info.totalLots : '—'}</span></div>
    <div class="tt-row"><span class="tt-label">Win rate</span><span class="tt-val">${info.wr.toFixed(1)}%</span></div>
    <div class="tt-row"><span class="tt-label">Mejor trade</span><span class="tt-val pos">${fmtMoney(info.best)}</span></div>
    <div class="tt-row"><span class="tt-label">Peor trade</span><span class="tt-val neg">${fmtMoney(info.worst)}</span></div>
  `;
      tooltip.style.display = 'block';
      moveTip(e);
    }
    function moveTip(e) {
      let x = e.clientX + 14, y = e.clientY - 10;
      if (x + 220 > window.innerWidth) x = e.clientX - 230;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }
    function hideTip() { tooltip.style.display = 'none'; }

    function fmtMoney(v) {
      const val = isCentAccount ? v / 100 : v;
      const abs = Math.abs(val).toLocaleString('en-US', { maximumFractionDigits: 0 });
      return (val >= 0 ? '+$' : '-$') + abs;
    }

    function toggleCent() {
      isCentAccount = !isCentAccount;
      // Update drop-zone button
      const dzBtn = document.getElementById('cent-toggle-btn');
      if (dzBtn) dzBtn.classList.toggle('active', isCentAccount);
      // Re-render if data is loaded
      if (Object.keys(allData).length > 0) {
        renderAll();
      }
    }

    function resetApp() {
      results.style.display = 'none';
      dropZone.style.display = 'block';
      fileInput.value = '';
      errorBox.style.display = 'none';
      allData = {};
      months = [];
    }
  </script>
</body>

</html>
